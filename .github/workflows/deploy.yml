# Deploy Nestor to the VPS. DISABLED from auto-running until the VPS exists (T008):
# it needs repo secrets VPS_HOST / VPS_USER / VPS_SSH_KEY, which aren't set yet —
# auto-running on push would fail every time (that was the source of the failed-build
# emails). Manual-trigger only for now; T008 will flip it back to `on: push` once the
# secrets are configured. CI/build health is covered by ci.yml on every push.
name: deploy

on:
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release

      - name: Ship binary to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "target/release/nestor"
          target: "~/nestor/bin"
          strip_components: 2

      - name: Restart timer
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: systemctl --user restart nestor-weather.timer || true
