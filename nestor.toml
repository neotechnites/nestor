# Nestor runtime config. No secrets here (those live in .env / env).
# Env overrides: NESTOR_ENV (mode), NESTOR_BANKROLL, NESTOR_STATE_PATH, NESTOR_CONFIG.

[trading]
env = "paper"          # paper | live  (NESTOR_ENV overrides)
bankroll = 1000.0      # starting equity, used only to seed fresh state

[risk]
fraction = 0.05             # fraction of bankroll per fraction-sized trade
cluster_cap_frac = 0.15     # max at-risk in one correlation cluster
flat_usd = 10.0             # flat $ per flat-sized trade (weather)
daily_budget_usd = 80.0     # daily flat-budget cap
max_drawdown_frac = 0.30    # halt if drawdown from peak exceeds this
daily_loss_limit_frac = 0.15 # halt if today's realized loss exceeds this * peak
max_portfolio_frac = 0.50   # total at-risk across ALL open positions <= this * bankroll

# Weather cities. series + station MUST be verified live (T005).
# bias = mean(forecast - actual) deg F; placeholders until calibration (T003).
